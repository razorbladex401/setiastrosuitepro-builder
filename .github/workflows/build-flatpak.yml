name: Build Flatpak

on:
  push:
    branches:
      - "main"
    tags:
      - "*"
    paths-ignore:
      - "README.md"
      - "*.md"
      - "**/*.md"
      - "LICENSE"
      - "LICENSE.*"
  pull_request:
    branches:
      - "main"
    types:
      - closed
    paths-ignore:
      - "README.md"
      - "*.md"
      - "**/*.md"
      - "LICENSE"
      - "LICENSE.*"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream ref to build (default: main)"
        required: false
        default: "main"
      package_release:
        description: "Release suffix for bundle filename (default: build date YYYYMMDD)"
        required: false
        default: ""
      flatpak_branch:
        description: "Flatpak branch to bundle (default: stable)"
        required: false
        default: "stable"
  schedule:
    - cron: "25 3 * * *"

permissions:
  contents: write

env:
  UPSTREAM_REF: main
  PACKAGE_RELEASE: ""
  FLATPAK_BRANCH: stable

jobs:
  build_flatpak:
    name: Build Flatpak
    runs-on: ubuntu-24.04
    if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
    outputs:
      build_status: ${{ steps.meta.outputs.build_status }}
      build_ref: ${{ steps.meta.outputs.build_ref }}
      build_version: ${{ steps.meta.outputs.build_version }}
      release_number: ${{ steps.meta.outputs.release_number }}
      bundle_name: ${{ steps.final_outputs.outputs.bundle_name }}
      pkg_version: ${{ steps.final_outputs.outputs.pkg_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder curl git sed grep jq gh clamav clamav-freshclam

      - name: Ensure scripts are executable
        run: chmod +x scripts/*.sh packaging/setiastrosuitepro-flatpak-launcher.sh

      - name: Security scan (source, pre-build)
        run: |
          set -euo pipefail
          mkdir -p out/security

          # Stop the background service so it doesn't hold the log file lock,
          # then update signatures into the system DB directory as root.
          sudo systemctl stop clamav-freshclam 2>/dev/null || true
          sudo freshclam --stdout || true

          CLAMAV_DB_DIR="/var/lib/clamav"
          if ! find "${CLAMAV_DB_DIR}" -maxdepth 1 -type f \( -name '*.cvd' -o -name '*.cld' -o -name '*.cud' \) | grep -q .; then
            echo "No ClamAV database files are available." >&2
            exit 2
          fi

          clamscan -r --infected --database="${CLAMAV_DB_DIR}" --exclude-dir='^\.git$' --exclude-dir='^work$' --exclude-dir='^out$' . | tee out/security/source-clamscan.txt

      - name: Compute build metadata and schedule gate
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          BUILD_REF="${UPSTREAM_REF}"
          BUILD_VERSION=""
          BUILD_STATUS="started"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_REF="${{ inputs.upstream_ref || '' }}"
            if [[ -n "${INPUT_REF}" ]]; then
              BUILD_REF="${INPUT_REF}"
            fi
          fi

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "Scheduled run: comparing upstream updates.json against published GitHub releases"
            UPDATES_JSON="$(curl --fail --silent --show-error 'https://raw.githubusercontent.com/setiastro/setiastrosuitepro/main/updates.json')"
            REMOTE_VERSION="$(printf '%s' "${UPDATES_JSON}" | jq -r '.version // empty')"

            if [[ -z "${REMOTE_VERSION}" ]]; then
              echo "Could not determine version from upstream updates.json" >&2
              exit 1
            fi

            if gh release view "flatpak-v${REMOTE_VERSION}" >/dev/null 2>&1; then
              echo "Version ${REMOTE_VERSION} already published in GitHub Releases. Skipping build."
              BUILD_STATUS="skipped"
            else
              BUILD_REF="main"
              BUILD_VERSION="${REMOTE_VERSION}"
              echo "New upstream version detected: ${REMOTE_VERSION}; building from ${BUILD_REF}."
            fi
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            INPUT_RELEASE="${{ inputs.package_release || '' }}"
            INPUT_BRANCH="${{ inputs.flatpak_branch || '' }}"
            RELEASE_NUMBER="${INPUT_RELEASE:-${PACKAGE_RELEASE:-$(date -u +%Y%m%d)}}"
            EFFECTIVE_BRANCH="${INPUT_BRANCH:-${FLATPAK_BRANCH}}"
          else
            RELEASE_NUMBER="${PACKAGE_RELEASE:-$(date -u +%Y%m%d)}"
            EFFECTIVE_BRANCH="${FLATPAK_BRANCH}"
          fi

          {
            echo "build_status=${BUILD_STATUS}"
            echo "build_ref=${BUILD_REF}"
            echo "build_version=${BUILD_VERSION}"
            echo "release_number=${RELEASE_NUMBER}"
            echo "flatpak_branch=${EFFECTIVE_BRANCH}"
          } >> "$GITHUB_OUTPUT"

      - name: Build bundle
        if: steps.meta.outputs.build_status != 'skipped'
        run: |
          set -euo pipefail
          BUILD_REF="${{ steps.meta.outputs.build_ref }}"
          BUILD_VERSION="${{ steps.meta.outputs.build_version }}"
          RELEASE_NUMBER="${{ steps.meta.outputs.release_number }}"
          BRANCH="${{ steps.meta.outputs.flatpak_branch }}"

          if [[ -n "${BUILD_VERSION}" ]]; then
            ./scripts/build_flatpak.sh --ref "${BUILD_REF}" --version "${BUILD_VERSION}" --release "${RELEASE_NUMBER}" --branch "${BRANCH}"
          else
            ./scripts/build_flatpak.sh --ref "${BUILD_REF}" --release "${RELEASE_NUMBER}" --branch "${BRANCH}"
          fi

      - name: Collect artifact metadata
        if: steps.meta.outputs.build_status != 'skipped'
        id: artifact_meta
        run: |
          set -euo pipefail
          BUNDLE_PATH="$(find out/flatpak -type f -name '*.flatpak' | head -n1)"
          if [[ -z "${BUNDLE_PATH}" ]]; then
            echo "Expected Flatpak bundle output not found." >&2
            exit 1
          fi

          BUNDLE_NAME="$(basename "${BUNDLE_PATH}")"
          PKG_VERSION="$(echo "${BUNDLE_NAME}" | sed -E 's/^setiastrosuitepro-([^-]+)-.*/\1/')"

          {
            echo "bundle_name=${BUNDLE_NAME}"
            echo "pkg_version=${PKG_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        if: steps.meta.outputs.build_status != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-bundle
          path: out/flatpak/*.flatpak
          if-no-files-found: error

      - name: Expose final outputs
        if: always()
        run: |
          {
            echo "bundle_name=${{ steps.artifact_meta.outputs.bundle_name || '' }}"
            echo "pkg_version=${{ steps.artifact_meta.outputs.pkg_version || '' }}"
          } >> "$GITHUB_OUTPUT"
        id: final_outputs

  publish_release_asset:
    name: Publish to GitHub Release
    runs-on: ubuntu-24.04
    needs: build_flatpak
    if: needs.build_flatpak.outputs.build_status != 'skipped' && (github.event_name != 'pull_request' || github.event.pull_request.merged == true)

    steps:
      - name: Download built bundle
        uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle
          path: out/flatpak

      - name: Install scanner dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clamav clamav-freshclam

      - name: Security scan (bundle, pre-publish)
        run: |
          set -euo pipefail
          mkdir -p out/security

          # Stop the background service so it doesn't hold the log file lock,
          # then update signatures into the system DB directory as root.
          sudo systemctl stop clamav-freshclam 2>/dev/null || true
          sudo freshclam --stdout || true

          CLAMAV_DB_DIR="/var/lib/clamav"
          if ! find "${CLAMAV_DB_DIR}" -maxdepth 1 -type f \( -name '*.cvd' -o -name '*.cld' -o -name '*.cud' \) | grep -q .; then
            echo "No ClamAV database files are available." >&2
            exit 2
          fi

          BUNDLE_PATH="$(find out/flatpak -type f -name '*.flatpak' | head -n1)"
          clamscan --infected --database="${CLAMAV_DB_DIR}" "${BUNDLE_PATH}" | tee out/security/bundle-clamscan.txt

      - name: Create or update release and upload asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          BUNDLE_PATH="$(find out/flatpak -type f -name '*.flatpak' | head -n1)"
          BUNDLE_NAME="$(basename "${BUNDLE_PATH}")"
          PKG_VERSION="${{ needs.build_flatpak.outputs.pkg_version }}"
          RELEASE_NUMBER="${{ needs.build_flatpak.outputs.release_number }}"

          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG_NAME="${{ github.ref_name }}"
            RELEASE_NAME="Seti Astro Suite Pro Flatpak ${PKG_VERSION}-${RELEASE_NUMBER}"
            RELEASE_NOTES="Flatpak build ${PKG_VERSION}-${RELEASE_NUMBER} for tag ${TAG_NAME}."
          else
            TAG_NAME="flatpak-v${PKG_VERSION}"
            RELEASE_NAME="Seti Astro Suite Pro Flatpak ${PKG_VERSION}-${RELEASE_NUMBER}"
            RELEASE_NOTES="Automated Flatpak build ${PKG_VERSION}-${RELEASE_NUMBER}."
          fi

          if gh release view "${TAG_NAME}" -R "${GH_REPO}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" -R "${GH_REPO}" --title "${RELEASE_NAME}" --notes "${RELEASE_NOTES}"
          else
            gh release create "${TAG_NAME}" -R "${GH_REPO}" --title "${RELEASE_NAME}" --notes "${RELEASE_NOTES}"
          fi

          gh release upload "${TAG_NAME}" -R "${GH_REPO}" "${BUNDLE_PATH}" --clobber

  publish_flatpak_repo:
    name: Publish Flatpak to GitHub Pages
    runs-on: ubuntu-24.04
    needs: build_flatpak
    if: needs.build_flatpak.outputs.build_status != 'skipped' && (github.event_name != 'pull_request' || github.event.pull_request.merged == true)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download built bundle
        uses: actions/download-artifact@v4
        with:
          name: flatpak-bundle
          path: out/flatpak

      - name: Install dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder ostree gpg

      - name: Create OSTree repository
        run: |
          set -euo pipefail
          REPO_DIR="repo"
          mkdir -p "${REPO_DIR}"
          
          # Initialize an OSTree repository if it doesn't exist
          if [[ ! -d "${REPO_DIR}/objects" ]]; then
            ostree init --mode=archive --repo="${REPO_DIR}"
          fi

      - name: Export Flatpak bundle to OSTree repository
        run: |
          set -euo pipefail
          BUNDLE_PATH="$(find out/flatpak -type f -name '*.flatpak' | head -n1)"
          REPO_DIR="repo"
          
          # Import the bundle into the OSTree repository
          flatpak build-import-bundle "${REPO_DIR}" "${BUNDLE_PATH}"

      - name: Import GPG key and sign repository
        env:
          GPG_KEY_SECRET: ${{ secrets.FLATPAK_GPG_KEY }}
          GPG_KEY_PASSPHRASE: ${{ secrets.FLATPAK_GPG_PASSPHRASE }}
          GPG_KEY_ID: ${{ secrets.FLATPAK_GPG_KEY_ID }}
        run: |
          set -euo pipefail
          REPO_DIR="repo"
          
          # Configure gpg for non-interactive use in CI runners.
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          {
            echo "pinentry-mode loopback"
            echo "batch"
            echo "no-tty"
          } > ~/.gnupg/gpg.conf
          echo "allow-loopback-pinentry" > ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent || true

          # Import the GPG key.
          echo "${GPG_KEY_SECRET}" | gpg --batch --no-tty --pinentry-mode loopback --import
          
          # Get the key ID from secret or derive from imported key
          if [[ -n "${GPG_KEY_ID:-}" ]]; then
            KEY_ID="${GPG_KEY_ID}"
          else
            # Fallback: use the fingerprint of the imported key
            KEY_ID="$(gpg --list-keys --with-colons | grep pub | cut -d: -f5 | head -n1)"
          fi
          
          if [[ -z "${KEY_ID}" ]]; then
            echo "Error: Could not determine GPG key ID" >&2
            exit 1
          fi

          # Prime gpg-agent in non-interactive mode when a passphrase is set.
          if [[ -n "${GPG_KEY_PASSPHRASE:-}" ]]; then
            printf 'ci-signing-check' > /tmp/gpg-probe.txt
            gpg --batch --yes --no-tty --pinentry-mode loopback \
              --passphrase "${GPG_KEY_PASSPHRASE}" \
              --local-user "${KEY_ID}" \
              --output /tmp/gpg-probe.sig \
              --sign /tmp/gpg-probe.txt
          fi
          
          # Sign the repository metadata
          flatpak build-update-repo \
            --gpg-sign="${KEY_ID}" \
            --gpg-homedir="${HOME}/.gnupg" \
            --ostree-verbose \
            "${REPO_DIR}"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ github.token }}
          publish_dir: ./repo
          cname: false
