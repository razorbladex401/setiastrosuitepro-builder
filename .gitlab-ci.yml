stages:
  - build
  - release

variables:
  PACKAGE_NAME: "setiastrosuitepro-flatpak"
  UPSTREAM_REF: "main"
  PACKAGE_RELEASE: ""
  FLATPAK_BRANCH: "stable"

build_flatpak:
  stage: build
  image: fedora:43
  timeout: 120 minutes
  script:
    - echo "BUILD_STATUS=started" > build.env
    - dnf -y install flatpak flatpak-builder curl git sed tar which jq clamav clamav-update
    - chmod +x scripts/*.sh packaging/setiastrosuitepro-flatpak-launcher.sh
    - mkdir -p out/security
    - CLAMAV_DB_DIR="${CI_PROJECT_DIR}/.clamav-db"
    - CLAMAV_CFG="${CI_PROJECT_DIR}/freshclam.conf"
    - mkdir -p "${CLAMAV_DB_DIR}"
    - chown -R 998:998 "${CLAMAV_DB_DIR}" || true
    - chmod 0777 "${CLAMAV_DB_DIR}"
    - |
      cat > "${CLAMAV_CFG}" <<EOF
      DatabaseDirectory ${CLAMAV_DB_DIR}
      DatabaseMirror database.clamav.net
      Foreground yes
      UpdateLogFile ${CI_PROJECT_DIR}/freshclam.log
      Checks 1
      EOF
    - freshclam --config-file="${CLAMAV_CFG}" || true
    - |
      if ! find "${CLAMAV_DB_DIR}" -maxdepth 1 -type f \( -name '*.cvd' -o -name '*.cld' -o -name '*.cud' \) | grep -q .; then
        if [[ -d /var/lib/clamav ]] && find /var/lib/clamav -maxdepth 1 -type f \( -name '*.cvd' -o -name '*.cld' -o -name '*.cud' \) | grep -q .; then
          CLAMAV_DB_DIR="/var/lib/clamav"
        else
          echo "No ClamAV database files are available." >&2
          exit 2
        fi
      fi
      echo "CLAMAV_DB_DIR=${CLAMAV_DB_DIR}" >> build.env
    - source build.env
    - clamscan -r --infected --database="${CLAMAV_DB_DIR}" --exclude-dir='^\.git$' --exclude-dir='^work$' --exclude-dir='^out$' . | tee out/security/source-clamscan.txt
    - BUILD_REF="${UPSTREAM_REF}"
    - BUILD_VERSION=""
    - |
      if [[ "${CI_PIPELINE_SOURCE}" == "schedule" ]]; then
        echo "Scheduled pipeline detected: checking upstream updates.json against package registry"

        UPDATES_JSON="$(curl --fail --silent --show-error 'https://raw.githubusercontent.com/setiastro/setiastrosuitepro/main/updates.json')"
        REMOTE_VERSION="$(printf '%s' "${UPDATES_JSON}" | jq -r '.version // empty')"
        if [[ -z "${REMOTE_VERSION}" ]]; then
          echo "Could not determine version from upstream updates.json" >&2
          exit 1
        fi

        PKG_JSON="$(curl --silent --show-error --header "JOB-TOKEN: ${CI_JOB_TOKEN}" "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages?package_type=generic&package_name=${PACKAGE_NAME}&order_by=created_at&sort=desc&per_page=1" || true)"
        LAST_BUILT_VERSION="$(printf '%s' "${PKG_JSON}" | jq -r 'if type=="array" and length>0 then .[0].version // "" else "" end' 2>/dev/null || true)"

        echo "Latest upstream version from updates.json: ${REMOTE_VERSION}"
        if [[ -n "${LAST_BUILT_VERSION}" ]]; then
          echo "Most recent published package version: ${LAST_BUILT_VERSION}"
        else
          echo "No previously published package version found"
        fi

        if [[ -n "${LAST_BUILT_VERSION}" && "${LAST_BUILT_VERSION}" == "${REMOTE_VERSION}" ]]; then
          echo "No new upstream version. Skipping scheduled build."
          {
            echo "BUILD_STATUS=skipped"
            echo "SKIP_REASON=No new upstream version"
            echo "REMOTE_VERSION=${REMOTE_VERSION}"
            echo "LAST_BUILT_VERSION=${LAST_BUILT_VERSION}"
          } > build.env
          exit 0
        fi

        BUILD_REF="main"
        BUILD_VERSION="${REMOTE_VERSION}"
        echo "New upstream version detected: ${REMOTE_VERSION}. Building from main branch."
      fi
    - RELEASE_NUMBER="${PACKAGE_RELEASE:-${CI_PIPELINE_IID:-1}}"
    - |
      if [[ -n "${BUILD_VERSION}" ]]; then
        ./scripts/build_flatpak.sh --ref "${BUILD_REF}" --version "${BUILD_VERSION}" --release "${RELEASE_NUMBER}" --branch "${FLATPAK_BRANCH}"
      else
        ./scripts/build_flatpak.sh --ref "${BUILD_REF}" --release "${RELEASE_NUMBER}" --branch "${FLATPAK_BRANCH}"
      fi
    - BUNDLE_PATH="$(find out/flatpak -type f -name '*.flatpak' | head -n1)"
    - |
      if [[ -z "${BUNDLE_PATH}" ]]; then
        echo "Expected Flatpak bundle output not found." >&2
        exit 1
      fi
    - BUNDLE_NAME="$(basename "${BUNDLE_PATH}")"
    - PKG_VERSION="$(echo "${BUNDLE_NAME}" | sed -E 's/^setiastrosuitepro-([^-]+)-.*/\1/')"
    - du -h "${BUNDLE_PATH}"
    - clamscan --infected --database="${CLAMAV_DB_DIR}" "${BUNDLE_PATH}" | tee out/security/bundle-clamscan.txt
    - PACKAGE_BASE_URL="${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${PKG_VERSION}"
    - |
      curl --fail --insecure --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file "${BUNDLE_PATH}" \
        "${PACKAGE_BASE_URL}/${BUNDLE_NAME}"
    - BUNDLE_URL="${CI_SERVER_URL}/${CI_PROJECT_PATH}/-/packages/generic/${PACKAGE_NAME}/${PKG_VERSION}/${BUNDLE_NAME}"
    - |
      {
        echo "BUNDLE_PATH=${BUNDLE_PATH}"
        echo "BUNDLE_NAME=${BUNDLE_NAME}"
        echo "PKG_VERSION=${PKG_VERSION}"
        echo "PACKAGE_RELEASE=${RELEASE_NUMBER}"
        echo "FLATPAK_BRANCH=${FLATPAK_BRANCH}"
        echo "UPSTREAM_REF=${BUILD_REF}"
        echo "BUNDLE_URL=${BUNDLE_URL}"
      } > build.env
  artifacts:
    paths:
      - out/flatpak/*.flatpak
      - out/security/*.txt
    reports:
      dotenv: build.env
    expire_in: 7 days
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'

release_flatpak:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build_flatpak
      artifacts: true
  script:
    - echo "Creating Flatpak release for ${CI_COMMIT_TAG} with ${BUNDLE_NAME}"
  release:
    tag_name: '$CI_COMMIT_TAG'
    name: 'Seti Astro Suite Pro Flatpak $PKG_VERSION-$PACKAGE_RELEASE'
    description: 'Flatpak build $PKG_VERSION-$PACKAGE_RELEASE for tag $CI_COMMIT_TAG.'
    assets:
      links:
        - name: 'Flatpak Bundle ($PKG_VERSION-$PACKAGE_RELEASE)'
          url: '$BUNDLE_URL'
  rules:
    - if: '$CI_COMMIT_TAG'
